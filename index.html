<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Red & Black Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <h2>Simple Calculator</h2>
        
        <div class="input-group">
            <input type="number" id="num1" placeholder="Enter first number" required>
            <input type="number" id="num2" placeholder="Enter second number" required>
        </div>

        <div class="button-grid">
            <button id="addBtn" class="operator-btn">+</button>
            <button id="subBtn" class="operator-btn">-</button>
            <button id="mulBtn" class="operator-btn">×</button>
            <button id="divBtn" class="operator-btn">÷</button>
        </div>

        <div class="result-display">
            <span id="resultText">Result: --</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
